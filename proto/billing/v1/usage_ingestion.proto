syntax = "proto3";

package billing.v1;

option java_multiple_files = true;
option java_package = "com.lordkay.billing.proto.v1";
option java_outer_classname = "UsageIngestionProto";

service UsageIngestionService {
  rpc IngestUsage(IngestUsageRequest) returns (IngestUsageResponse);
}

message IngestUsageRequest {
  string tenant_id = 1;
  string meter_id = 2;
  string idempotency_key = 3;
  int64 quantity = 4;
  int64 occurred_at_epoch_ms = 5;
}

message IngestUsageResponse {
  string usage_event_id = 1;
  string status = 2;
  string message = 3;
  int64 rated_amount_minor = 4;
  string invoice_id = 5;
}
