name: ci

on:
  push:
    branches: [main, "milestone/**"]
  pull_request:
    branches: [main]

jobs:
  services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - usage-ingestion-service
          - rating-service
          - invoicing-service
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Build and test
        run: ./gradlew clean test
