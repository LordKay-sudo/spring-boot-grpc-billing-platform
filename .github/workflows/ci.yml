name: ci

on:
  push:
    branches: [main, "milestone/**"]
  pull_request:
    branches: [main]

jobs:
  services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - usage-ingestion-service
          - rating-service
          - invoicing-service
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Build and test
        run: ./gradlew clean test

  protobuf-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1
      - name: Buf lint
        run: buf lint proto
      - name: Buf breaking change check
        if: github.event_name == 'pull_request'
        run: buf breaking proto --against '.git#branch=main,subdir=proto'
