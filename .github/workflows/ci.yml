name: ci

on:
  push:
    branches: [main, "milestone/**"]
  pull_request:
    branches: [main]

jobs:
  usage-ingestion-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: usage-ingestion-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Build and test
        run: ./gradlew clean test
